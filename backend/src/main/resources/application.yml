spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tenpay}
    username: ${SPRING_DATASOURCE_USERNAME:tenpay_user}
    password: ${SPRING_DATASOURCE_PASSWORD:tenpay_pass}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  # JavaMailSender: si MAIL_HOST no está configurado, la app arranca igual
  # (mail.enabled=false) pero sin capacidad de enviar emails.
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${PORT:8080}

# JWT: secret debe tener mínimo 32 caracteres (256 bits para HMAC-SHA256)
jwt:
  secret: ${JWT_SECRET:tenpay-dev-secret-key-min-32-chars!!}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 horas

# Controla si se intentan enviar emails (true solo si MAIL_HOST está configurado)
mail:
  enabled: ${MAIL_ENABLED:false}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

spring.jackson.serialization.write-dates-as-timestamps: false
